name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement de déploiement'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Package release
        run: |
          mkdir -p release/dashboard-by-kimi-2.0
          cp -r backend release/dashboard-by-kimi-2.0/
          cp -r frontend/dist release/dashboard-by-kimi-2.0/frontend/
          cp package.json release/dashboard-by-kimi-2.0/
          cp README.md release/dashboard-by-kimi-2.0/
          cp backend/.env.example release/dashboard-by-kimi-2.0/backend/.env.example
          tar -czf dashboard-by-kimi-2.0.tar.gz -C release dashboard-by-kimi-2.0

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-by-kimi-2.0-${{ github.ref_name || github.sha }}
          path: dashboard-by-kimi-2.0.tar.gz
          retention-days: 30

