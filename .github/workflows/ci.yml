name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & Audit (rapide — échec early)
  # ─────────────────────────────────────────────
  lint-and-audit:
    name: Lint & Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Audit dependencies
        run: npm audit --workspaces --audit-level=high
        continue-on-error: false

  # ─────────────────────────────────────────────
  # 2. Backend Python — Tests + Coverage
  # ─────────────────────────────────────────────
  backend-py:
    name: Backend Python Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-audit
    defaults:
      run:
        working-directory: ./backend_py

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=xml
        env:
          JWT_SECRET: test-jwt-secret-min-32-chars-long
          ADMIN_API_TOKEN: test-admin-token

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-py-coverage
          path: backend_py/coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────
  # 3. Frontend — Tests Vitest + Coverage + Build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend Tests, Coverage & Build
    runs-on: ubuntu-latest
    needs: lint-and-audit
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build production
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # 4. Summary — État global de la pipeline
  # ─────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-and-audit, backend-py, frontend]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "Lint & Audit: ${{ needs.lint-and-audit.result }}"
          echo "Backend Py:   ${{ needs.backend-py.result }}"
          echo "Frontend:     ${{ needs.frontend.result }}"

      - name: Fail if any job failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
